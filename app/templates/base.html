<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AudioLab{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

    <header class="topbar">
        <div class="brand">
            <h1>AudioLab</h1>
            <p>Visor local de análisis de audio</p>
        </div>

        <nav class="nav-tabs">
            <a href="{{ url_for('main.inicio') }}" class="tab-link {% if active_page == 'inicio' %}active{% endif %}">Inicio</a>
            <a href="{{ url_for('main.analisis') }}" class="tab-link {% if active_page == 'analisis' %}active{% endif %}">Análisis</a>
            <a href="{{ url_for('main.interpretacion') }}" class="tab-link {% if active_page == 'interpretacion' %}active{% endif %}">Interpretación</a>
            <a href="{{ url_for('main.acerca') }}" class="tab-link {% if active_page == 'acerca' %}active{% endif %}">Acerca del proyecto</a>
        </nav>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
